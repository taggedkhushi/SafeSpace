<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../style.css">

  <style>
    body {
      background: #f5faff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .history-container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .log {
      background: #eef5ff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    a {
      color: #4a90e2;
      text-decoration: none;
    }

    .back-btn {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4a90e2;
      color: white;
      cursor: pointer;
    }
  </style>
  <script src="../components/navbar.js"></script>
  <script src="../components/utils.js"></script>
</head>

<body onload="loadNavbar(); loadHistory()">

  <div class="history-container">
    <h2>📂 Your Safety History</h2>

    <!-- Logs will appear here -->
    <div id="historyList"></div>

    <button class="back-btn" onclick="goBack()">⬅ Back</button>
  </div>

  <!-- JS -->
  <script src="../script.js"></script>

  <script>
    function goBack() {
      window.location.href = "../index.html";
    }
  </script>

</body>
</html>
