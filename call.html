<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incoming Call</title>

  <link rel="stylesheet" href="../style.css">

  <style>
    body {
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .call-container {
      text-align: center;
    }

    .call-container h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .caller {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .accept {
      background: green;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }

    .reject {
      background: red;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
  <script src="../components/navbar.js"></script>
  <script src="../components/utils.js"></script>
</head>
<body onload="loadNavbar()">

  <div class="call-container">
    <h2>📞 Incoming Call...</h2>
    <p class="caller">Mom Calling...</p>

    <div class="buttons">
      <button class="accept" onclick="acceptCall()">✔</button>
      <button class="reject" onclick="rejectCall()">✖</button>
    </div>
  </div>

  <!-- ✅ JS must be inside script -->
  <script>
  let ringtone = new Audio("../assets/sounds/ringtone.mp3");
  ringtone.loop = true;

  window.addEventListener("load", () => {
    ringtone.play().catch(() => {
      console.log("Sound blocked by browser");
    });
  });

  function acceptCall() {
    ringtone.pause();
    ringtone.currentTime = 0;
    alert("Call Accepted");
    window.location.href = "../index.html";
  }

  function rejectCall() {
    ringtone.pause();
    ringtone.currentTime = 0;
    alert("Call Rejected");
    window.location.href = "../index.html";
  }
</script>
</body>
</html>
